name: Smoketest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Allow the workflow to read repository contents and write to checks
permissions:
  contents: read
  checks: write
  packages: write
  attestations: write
  id-token: write

jobs:
  smoketest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: "https://npm.pkg.github.com"
          cache: 'npm'

      - name: Create .npmrc file
        run: |
          echo "@NorthskySocial:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TypeScript type checking
        run: npm run typecheck

      - name: Build application
        run: npm run build -- --mode=docker
        env:
          NODE_ENV: production

      - name: Test build artifacts exist
        run: |
          if [ ! -d "build" ]; then
            echo "Build directory does not exist"
            exit 1
          fi

          if [ ! -f "build/server/index.js" ]; then
            echo "Server build artifact does not exist"
            exit 1
          fi

          echo "✅ Build artifacts verified"

      - name: Test production server starts
        run: |
          timeout 30s npm run start &
          SERVER_PID=$!

          sleep 5

          SERVER_STARTED=false
          PORT=3000
          if curl -f --connect-timeout 5 --max-time 10 http://localhost:$PORT/ > /dev/null 2>&1; then
            echo "✅ Server is responding on port $PORT"
            SERVER_STARTED=true
          fi

          if kill -0 $SERVER_PID 2>/dev/null; then
            kill $SERVER_PID
          fi

          if [ "$SERVER_STARTED" = false ]; then
            echo "⚠️  Server startup test skipped - could not detect running server"
          fi
