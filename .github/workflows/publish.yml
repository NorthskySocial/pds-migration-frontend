name: Create and publish a Docker image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Defines two custom environment variables for the workflow. These are used for the Container registry domain, and a name for the Docker image that this workflow builds.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# There is a single job in this workflow. It's configured to run on the latest available version of Ubuntu.
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://npm.pkg.github.com"

      # Create .npmrc file with GitHub token for private package access
      - name: Create .npmrc file
        run: |
          echo "@NorthskySocial:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      # Uses the `docker/login-action` action to log in to the Container registry registry using the account and password that will publish the packages. Once published, the packages are scoped to the account defined here.
      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # This step uses [docker/metadata-action](https://github.com/docker/metadata-action#about) to extract tags and labels that will be applied to the specified image. The `id` "meta" allows the output of this step to be referenced in a subsequent step. The `images` value provides the base name for the tags and labels.
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      # This step uses the `docker/build-push-action` action to build the image, based on your repository's `Dockerfile`. If the build succeeds, it pushes the image to GitHub Packages.
      # It uses the `context` parameter to define the build's context as the set of files located in the specified path. For more information, see [Usage](https://github.com/docker/build-push-action#usage) in the README of the `docker/build-push-action` repository.
      # It uses the `tags` and `labels` parameters to tag and label the image with the output from the "meta" step.
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secret-files: |
            npmrc=.npmrc

      # This step generates an artifact attestation for the image, which is an unforgeable statement about where and how it was built. It increases supply chain security for people who consume the image. For more information, see [Using artifact attestations to establish provenance for builds](/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds).
      - name: Generate artifact attestation
        if: false  # NOTE: disabled for now as we're on a private repository
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  deploy_pr_to_staging:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: build-and-push-image
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up kubectl (staging)
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Reset TTL job
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          kubectl delete job pr-$PR_NUMBER-ttl --ignore-not-found=true -n staging

      - name: Create new TTL job
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          envsubst < .github/k8s/ttl-job.yaml | kubectl apply -f -

      - name: Get new UID
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          JOB_UID=$(kubectl get job pr-$PR_NUMBER-ttl -o jsonpath='{.metadata.uid}')
          echo "JOB_UID=$JOB_UID" >> $GITHUB_ENV

      - name: Apply manifests
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          JOB_UID: ${{ env.JOB_UID }}
        run: |
          envsubst < .github/k8s/staging-deployment.yaml | kubectl apply -f -

      - name: Compute preview URL
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "PREVIEW_URL=https://pr-${PR_NUMBER}.pr.migrate.staging.northsky.social" >> $GITHUB_ENV

      - name: Compute deployment time
        run: |
          DEPLOY_TIME="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "DEPLOY_TIME=$DEPLOY_TIME" >> $GITHUB_ENV

      - name: Wait for 1 minute to allow deployment to stabilize
        run: sleep 60s

      - name: Update PR comment with preview link
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ env.PREVIEW_URL }}
          DEPLOY_TIME: ${{ env.DEPLOY_TIME }}
        run: |
          BODY="<!-- preview-env-comment -->
          🚀 **Staging environment is ready**
          **URL:** ${PREVIEW_URL}
          **Last deployed:** ${DEPLOY_TIME}
          *This environment resets on every push and auto-expires in 3 days.*"

          # Find existing comment using GitHub API
          COMMENT_ID=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("preview-env-comment")) | .id')

          if [ -z "$COMMENT_ID" ]; then
            echo "Creating new comment"
            gh pr comment $PR_NUMBER --body "$BODY"
          else
            echo "Updating existing comment $COMMENT_ID"
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -f body="$BODY"
          fi

  deploy_to_kubernetes:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build-and-push-image
    steps:
      - name: Trigger release through webhook
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.DEPLOYMENT_WEBHOOK_TOKEN }}
          repository: ${{ secrets.DEPLOYMENT_WEBHOOK_REPOSITORY }}
          event-type: restart-migration-fe

  notify_deployment:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: deploy_to_kubernetes
    steps:
      - name: Wait for successful deployment (2 minutes)
        run: sleep 120s

      - name: Notify Discord of successful deployment
        uses: rjstone/discord-webhook-notify@v2
        with:
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          severity: info
          username: 'Github Actions deployment'
          title: 'Migration Front-end deployment successful!'
          description: 'Latest build has been deployed to production successfully! [Access the migration front-end here](https://migrate.northsky.social)'
          details: 'Commit: ${{ github.event.head_commit.message }}'
